databaseChangeLog:
  - changeSet:
      id: 1
      author: scheduler
      changes:
        - createTable:
            tableName: jobs
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: varchar(1000)
              - column:
                  name: type
                  type: varchar(50)
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: varchar(50)
                  constraints:
                    nullable: false
              - column:
                  name: cron_expression
                  type: varchar(255)
              - column:
                  name: scheduled_time
                  type: timestamp
              - column:
                  name: payload
                  type: text
              - column:
                  name: quartz_job_key
                  type: varchar(255)
              - column:
                  name: quartz_trigger_key
                  type: varchar(255)
              - column:
                  name: created_at
                  type: timestamp
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamp
              - column:
                  name: created_by
                  type: varchar(255)
        
        - createIndex:
            indexName: idx_jobs_status
            tableName: jobs
            columns:
              - column:
                  name: status
        
        - createIndex:
            indexName: idx_jobs_type
            tableName: jobs
            columns:
              - column:
                  name: type
        
        - createIndex:
            indexName: idx_jobs_quartz_job_key
            tableName: jobs
            unique: true
            columns:
              - column:
                  name: quartz_job_key

  - changeSet:
      id: 2
      author: scheduler
      changes:
        - createTable:
            tableName: job_executions
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: job_id
                  type: uuid
                  constraints:
                    nullable: false
                    foreignKeyName: fk_job_executions_job
                    references: jobs(id)
              - column:
                  name: started_at
                  type: timestamp
                  constraints:
                    nullable: false
              - column:
                  name: completed_at
                  type: timestamp
              - column:
                  name: status
                  type: varchar(50)
                  constraints:
                    nullable: false
              - column:
                  name: error_message
                  type: text
              - column:
                  name: error_stack_trace
                  type: text
              - column:
                  name: result
                  type: text
        
        - createIndex:
            indexName: idx_job_executions_job_id
            tableName: job_executions
            columns:
              - column:
                  name: job_id
        
        - createIndex:
            indexName: idx_job_executions_status
            tableName: job_executions
            columns:
              - column:
                  name: status
        
        - createIndex:
            indexName: idx_job_executions_started_at
            tableName: job_executions
            columns:
              - column:
                  name: started_at
                  descending: true
